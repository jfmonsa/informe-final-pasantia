name: Build PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create/update the release
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Builds the image from the Dockerfile (via the latex-dev compose service)
      # and compiles the document with `make compile` (pdflatex -> biber -> pdflatex x2).
      # --user root lets the container write the generated PDF back into the
      # runner-owned workspace bind mount.
      - name: Build PDF (dockerized)
        run: docker compose run --rm --user root latex-dev make compile

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: informe-final-pasantia
          path: informe-final-pasantia-jfmonsa.pdf
          if-no-files-found: error

      # Publish the latest PDF as a rolling "latest" release.
      # Only on push to main (PRs / forks have a read-only token and can't release).
      - name: Publish PDF release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Informe Final de Pasantía (última versión)
          body: PDF compilado automáticamente desde el último push a `main` (commit ${{ github.sha }}).
          files: informe-final-pasantia-jfmonsa.pdf
